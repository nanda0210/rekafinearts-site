name: Deploy frontend to cPanel

on:
  push:
    branches: [main]
    paths:
      # Skip deploy for changes that don't affect the built frontend
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - ".env.production"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:   # also allow manual trigger from the Actions tab

concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite picks up .env.production)
        run: npm run build

      - name: FTP deploy dist/ → public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          # Hostname is public DNS info — hardcoded here to avoid the
          # GitHub secret-masking confusion when the secret value
          # gets corrupted/cleared. The credentials below stay secret.
          server: fiber23-r.iaasdns.com
          port: 21
          protocol: ftp
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Fresh state-file name forces a full diff against the server,
          # bypassing any stale .ftp-deploy-sync-state.json from the old
          # master FTP account era. Once watermarked images are uploaded,
          # this name stays — future runs are then incremental again.
          state-name: .ftp-deploy-state-v4.json
          local-dir: ./dist/
          # The deploy@rekagallery.vip account is chrooted to public_html,
          # so its FTP root IS public_html — use "./" not "/public_html/".
          server-dir: ./
          # Vite copies public/images/* into dist/images/* at build time,
          # so the build output IS the source of truth. FTP-Deploy-Action
          # diffs by file hash, so unchanged images aren't re-uploaded.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
